<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pour toi 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 90vw;
      max-width: 420px;
      height: 90vw;
      max-height: 420px;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(255, 77, 109, 0.6);
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: fade 1s ease-in-out;
    }

    .text {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      font-size: 20px;
      line-height: 1.6;
      animation: fade 1.2s ease;
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="slideshow" src="kenza8.jpg">
    <div id="text" class="text"></div>
  </div>

  <script>
    const images = [
      "kenza8.jpg",
      "kenza9.jpg",
      "kenza10.jpg",
      "kenza11.jpg",
      "kenza12.jpg",
      "kenza13.jpg",
      "kenza14.jpg",
      "kenza15.jpg",
      "kenza16.jpg",
      "kenza17.jpg",
      "kenza18.jpg",
      "kenza19.jpg"
    ];

    const poem = [
      "كنبغيك من قلبي وما نقدرش نخبي",
      "ضحكتك كتداوي جرحي وقلبي",
      "معاك الدنيا كتحلى فعيوني",
      "وغيابك كيخلّي لياليّ تطولي",
      "صوتك راحة لقلبي العيان",
      "وكلامك أمان وسط هاد الزمان",
      "فعيونك كنلقى السلام",
      "وكننسى الهمّ والأحزان",
      "معاك كنضحك بلا سبب",
      "ومعاك كنحس راسي محظوظ بزاف",
      "وجودك نعمة من ربي",
      "وبقربك كنلقى قلبي"
    ];

    let index = 0;
    const img = document.getElementById("slideshow");
    const text = document.getElementById("text");

    text.innerText = poem[0];

    const interval = setInterval(() => {
      index++;

      if (index < images.length) {
        img.src = images[index];
        text.innerText = poem[index];
      } else {
        clearInterval(interval);
        text.innerHTML = "رسالة صغيرة ليك 💖<br><br>كنبغيك أكثر من أي حاجة ❤️<br>وبغيت نقولك شدّي فـ خدمتك، وعافية عليك فهاد العشية 😌✨";
      }
    }, 3000);
  </script>

</body>
</html>
