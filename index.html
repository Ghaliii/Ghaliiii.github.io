<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Notre mini séjour 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 90vw;
      max-width: 420px;
      height: 90vw;
      max-height: 420px;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(255, 77, 109, 0.6);
      animation: fade 1s ease-in-out;
      background: #000;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: fade 1s ease-in-out;
    }

    .final-text {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      font-size: 18px;
      line-height: 1.6;
      animation: fade 1.5s ease;
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="slideshow" src="kenza8.jpg" alt="photo">
    <div id="finalText" class="final-text">
      Un petit résumé de notre mini séjour incroyable 💖<br><br>
      Pour toi, ma future petite femme 😌<br><br>
      En espérant que ce petit truc te rende heureuse  
      et un peu moins fatiguée 🥹✨<br><br>
      <strong>Je t’aime plus que tout ❤️</strong>
    </div>
  </div>

  <script>
    const images = [
      "kenza8.jpg",
      "kenza9.jpg",
      "kenza10.jpg",
      "kenza11.jpg",
      "kenza12.jpg",
      "kenza13.jpg",
      "kenza14.jpg",
      "kenza15.jpg",
      "kenza16.jpg",
      "kenza17.jpg",
      "kenza18.jpg",
      "kenza19.jpg"
    ];

    let index = 0;
    const img = document.getElementById("slideshow");
    const finalText = document.getElementById("finalText");

    const interval = setInterval(() => {
      index++;

      if (index < images.length) {
        img.src = images[index];
      } else {
        clearInterval(interval);
        finalText.style.display = "flex";
      }
    }, 2500);
  </script>

</body>
</html>
